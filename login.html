<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- DaisyUI and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
     <link rel="stylesheet" href="./styles.css">
  </head>

  <body>
    <!-- card holding -->
    <section class="w-full md:w-[60%]  mx-auto  flex justify-center ">
       
        <div class="card w-full max-w-[520px] bg-base-200 shadow-2xl rounded-xl my-15 pt-30">
         <div class="text-center   space-y-4">
            <img class="mx-auto w-12"  src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
             <div class="mx-auto w-full ">
                <fieldset class="fieldset w-full space-y-3 p-4">
            

                <label class="label">Username</label>
                <input id="input-text" class="input w-full" type="text"  placeholder="Enter Username" />
                <p class="text-primary">Default: admin</p>

                <label class="label">Password</label>
                <input id="input-password" class="input w-full" type="password" class="input" placeholder="Password" />
                <p class="text-primary">Default: admin123</p>

                <button class="btn btn-primary mb-5" id="login-btn">Sign In</button>
            </fieldset>
             </div>
        </div>
   
    </section>
    <!-- script js connection -->
     <script src="./login.js"></script>
  </body>
</html>
